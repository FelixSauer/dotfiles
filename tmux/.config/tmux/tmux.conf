# Tmux configuration
# Prefix key: Ctrl+s (instead of default Ctrl+b)

# Change prefix from Option(Alt)-Right+p
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Split panes using + and -
bind + split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch windows with Alt+1-9 (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Open new session with prefix + t
bind t new-session

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Switch panes using Alt+arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation (prefix-free Alt+hjkl, complements Alt+arrows above)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim-style pane navigation with prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing - small steps (prefix-free)
bind -n C-S-Left  resize-pane -L 1
bind -n C-S-Right resize-pane -R 1
bind -n C-S-Up    resize-pane -U 1
bind -n C-S-Down  resize-pane -D 1

# Pane resizing - large steps with prefix (-r = repeatable)
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

# Rotate panes in layout
bind -r C-o rotate-window -D

# Enable mouse mode
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Display messages for longer
set -g display-time 2000

# Status bar position
set -g status-position top

# Status bar — colors from onedarkpro "onedark_vivid" variant
# fg=#abb2bf  gray=#5c6370  bg=#282c34
# red=#ef596f  yellow=#e5c07b  green=#89ca78  cyan=#2bbac5  blue=#61afef  purple=#d55fde
set-option -g status-style bg=default,fg=#abb2bf

# Current window - onedarkpro blue
setw -g window-status-current-style fg=#61afef,bg=default,bold
setw -g window-status-current-format '  #I: #W#F  '

# Other windows - onedarkpro gray
setw -g window-status-style fg=#5c6370,bg=default,none
setw -g window-status-format '  #I: #W#F  '

# Window separator
setw -g window-status-separator ''

# Window with activity - onedarkpro yellow
setw -g window-status-activity-style fg=#e5c07b,bg=default,none

# Pane borders - inactive onedarkpro gray, active onedarkpro purple
set -g pane-border-style fg=#5c6370
set -g pane-active-border-style fg=#d55fde

# Copy mode selection - onedarkpro cyan
set -g mode-style bg=#2bbac5,fg=#282c34

# Status left - session name in onedarkpro green
set -g status-left '#[fg=#2bbac5,bold] ⌬  #[fg=#5c6370,bold]| '

# Status right - prefix indicator in onedarkpro red, clock in onedarkpro cyan
set -g status-right '#{?client_prefix,#[fg=#ef596f] ● #[default],}#[fg=#2bbac5] %H:%M'

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# TrueColor überall
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# feste Farben (kein terminal default)
set -g status-style bg=#282c34
set -g message-style bg=#282c34

set -g pane-border-style fg=#2c313c
set -g pane-active-border-style fg=#c678dd
set -g status-style bg=#282c34
set -g pane-border-style fg=#2c313c
set -g pane-active-border-style fg=#d55fde
set -g message-style bg=#282c34

# Reduce escape time for faster command sequences
set -sg escape-time 0

# -------------------------------------------------------------------
# Tmux Plugin Manager (TPM)
# -------------------------------------------------------------------
# List of plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Dynamic window naming based on running program / directory
set -g @plugin 'ofirgall/tmux-window-name'
set -g @tmux_window_name_use_tilde 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
 
